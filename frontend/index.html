<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentón - Tienda Online</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🏪 Pentón</h1>
                <p class="info-negocio">Matanzas, Cuba | Tel: 52620551</p>
            </div>
            <div class="nav-links">
                <button id="btnLogin" class="btn-primary">Iniciar Sesión</button>
                <button id="btnMisCuentas" class="btn-secondary" style="display: none;">Mi Cuenta</button>
                <button id="btnLogout" class="btn-danger" style="display: none;">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <!-- Modal de Login/Registro -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <button class="close" onclick="cerrarModal()">&times;</button>
            <div class="auth-container">
                <div class="tab-buttons">
                    <button class="tab-button active" onclick="mostrarTab('login')">Iniciar Sesión</button>
                    <button class="tab-button" onclick="mostrarTab('registro')">Registrarse</button>
                </div>

                <!-- Formulario de Login -->
                <form id="loginForm" class="auth-form active">
                    <h2>Iniciar Sesión</h2>
                    <div class="form-group">
                        <label for="loginEmail">Email:</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Contraseña:</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn-primary">Iniciar Sesión</button>
                </form>

                <!-- Formulario de Registro -->
                <form id="registroForm" class="auth-form">
                    <h2>Crear Cuenta</h2>
                    <div class="form-group">
                        <label for="registroNombre">Nombre:</label>
                        <input type="text" id="registroNombre" required>
                    </div>
                    <div class="form-group">
                        <label for="registroEmail">Email:</label>
                        <input type="email" id="registroEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="registroPassword">Contraseña:</label>
                        <input type="password" id="registroPassword" required>
                    </div>
                    <button type="submit" class="btn-primary">Registrarse</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Dashboard del Administrador -->
    <div id="dashboardAdmin" class="dashboard" style="display: none;">
        <div class="container">
            <h2>Panel de Administración - Mis Productos</h2>
            
            <div class="form-producto">
                <h3>Agregar Nuevo Producto</h3>
                <form id="formProducto">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombre">Nombre del Producto:</label>
                            <input type="text" id="nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="precio">Precio:</label>
                            <input type="number" id="precio" min="0" step="0.01" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cantidad">Cantidad:</label>
                            <input type="number" id="cantidad" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="categoria">Categoría:</label>
                            <input type="text" id="categoria" placeholder="ej: Electrónica">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="descripcion">Descripción:</label>
                        <textarea id="descripcion" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Agregar Producto</button>
                </form>
            </div>

            <div class="productos-lista">
                <h3>Tus Productos</h3>
                <div id="misProductos" class="productos-grid">
                    <!-- Se llenarán con JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Catálogo Público -->
    <main id="mainCatalogo" class="main-content">
        <div class="container">
            <h2>Catálogo de Productos</h2>
            <div id="productosPublicos" class="productos-grid">
                <!-- Se llenarán con JavaScript -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Pentón - Matanzas, Cuba | Tel: 52620551</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
